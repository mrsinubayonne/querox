    <!-- Recovery anti "page blanche" PWA: si un vieux cache charge des fichiers JS inexistants -->
    <script>
      (function () {
        var KEY = 'querox_pwa_recover_once';

        function recover(reason) {
          try {
            if (sessionStorage.getItem(KEY) === '1') return;
            sessionStorage.setItem(KEY, '1');
            console.warn('[PWA] recovery', reason);
          } catch (e) {}

          try {
            if ('serviceWorker' in navigator) {
              navigator.serviceWorker.getRegistrations().then(function(regs) {
                regs.forEach(function(r) { r.unregister(); });
              }).catch(function() {});
            }
          } catch (e) {}

          try {
            if (window.caches && typeof caches.keys === 'function') {
              caches.keys().then(function(keys) {
                keys.forEach(function(k) { caches.delete(k); });
              }).catch(function() {});
            }
          } catch (e) {}

          setTimeout(function() { window.location.reload(); }, 500);
        }

        window.addEventListener(
          'error',
          function (event) {
            var msg = String((event && event.message) || '');
            var target = event && event.target;
            var isModuleScript =
              target && target.tagName === 'SCRIPT' && target.type === 'module';

            var isLoadFail =
              msg.indexOf('Failed to load module script') !== -1 ||
              msg.indexOf('Loading chunk') !== -1 ||
              msg.indexOf('ChunkLoadError') !== -1 ||
              msg.indexOf('Failed to fetch dynamically imported module') !== -1 ||
              msg.indexOf('Unexpected token') !== -1 ||
              msg.indexOf('SyntaxError') !== -1;

            if (isModuleScript || isLoadFail) {
              recover(isModuleScript ? 'module-script-error' : msg.slice(0, 120));
            }
          },
          true
        );

        window.addEventListener('unhandledrejection', function(event) {
          var msg = String(event && event.reason || '');
          if (
            msg.indexOf('Failed to fetch dynamically imported module') !== -1 ||
            msg.indexOf('Failed to load module script') !== -1 ||
            msg.indexOf('error loading dynamically imported module') !== -1
          ) {
            recover('unhandled-rejection: ' + msg.slice(0, 100));
          }
        });

        // Force one-time cache purge for all users to fix white page
        var PURGE_KEY = 'querox_cache_purge_v2';
        if (!sessionStorage.getItem(PURGE_KEY)) {
          sessionStorage.setItem(PURGE_KEY, '1');
          try {
            if ('serviceWorker' in navigator) {
              navigator.serviceWorker.getRegistrations().then(function(regs) {
                regs.forEach(function(r) { r.unregister(); });
              }).catch(function() {});
            }
            if (window.caches && typeof caches.keys === 'function') {
              caches.keys().then(function(keys) {
                keys.forEach(function(k) { caches.delete(k); });
              }).catch(function() {});
            }
            // Clear stale localStorage keys
            try {
              var i, key, toRemove = [];
              for (i = 0; i < localStorage.length; i++) {
                key = localStorage.key(i);
                if (key && (key.indexOf('subscription_cache_') === 0 || key === 'selectedOutletId' || key === 'selectedProfileId')) {
                  toRemove.push(key);
                }
              }
              toRemove.forEach(function(k) { localStorage.removeItem(k); });
            } catch(e) {}
            // Reload after purge
            setTimeout(function() { window.location.reload(); }, 600);
          } catch(e) {}
        }

        setTimeout(function() {
          var root = document.getElementById('root');
          if (root && root.innerHTML.trim() === '') {
            recover('empty-root-after-timeout');
          }
        }, 12000);
      })();
    </script>
