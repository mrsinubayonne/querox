    <!-- Recovery anti "page blanche" PWA: si un vieux cache charge des fichiers JS inexistants -->
    <script>
      (function () {
        const KEY = 'querox_pwa_recover_once';

        async function recover(reason) {
          try {
            if (sessionStorage.getItem(KEY) === '1') return;
            sessionStorage.setItem(KEY, '1');
            console.warn('[PWA] recovery', reason);
          } catch {
            // ignore
          }

          try {
            if ('serviceWorker' in navigator) {
              const regs = await navigator.serviceWorker.getRegistrations();
              await Promise.all(regs.map((r) => r.unregister()));
            }
          } catch {
            // ignore
          }

          try {
            if (window.caches && caches.keys) {
              const keys = await caches.keys();
              await Promise.all(keys.map((k) => caches.delete(k)));
            }
          } catch {
            // ignore
          }

          window.location.reload();
        }

        window.addEventListener(
          'error',
          function (event) {
            const msg = String((event && event.message) || '');
            const target = event && event.target;
            const isModuleScript =
              target && target.tagName === 'SCRIPT' && target.type === 'module';

            const isLoadFail =
              msg.includes('Failed to load module script') ||
              msg.includes('Loading chunk') ||
              msg.includes('ChunkLoadError') ||
              msg.includes('Failed to fetch dynamically imported module') ||
              msg.includes('Unexpected token');

            if (isModuleScript || isLoadFail) {
              recover(isModuleScript ? 'module-script-error' : msg.slice(0, 120));
            }
          },
          true
        );
      })();
    </script>
